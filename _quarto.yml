project:
  type: website
  output-dir: _site

lang: vi

website:
  title: "Ôn tập OOP C++"
  search: true
  sidebar:
    style: docked
    search: true
    contents:
      - text: "Trang chủ"
        href: index.qmd
      - section: "Bài giảng lý thuyết"
        contents:
          - notes/01-tong-quan-cpp.qmd
          - notes/02-tong-quan-oop.qmd
          - notes/03-lop-doi-tuong.qmd
          - notes/04-lop-doi-tuong-2.qmd
          - notes/05-toan-tu.qmd
          - notes/06-ke-thua.qmd
          - notes/07-da-hinh.qmd

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    toc: true
    number-sections: true
    code-copy: true
    code-link: true
    code-overflow: wrap
    html-math-method: katex
  pdf:
    pdf-engine: xelatex
    documentclass: article
    papersize: a4
    geometry:
      - margin=2.2cm
    mainfont: "TeX Gyre Pagella"
    sansfont: "TeX Gyre Heros"
    monofont: "Latin Modern Mono"
    fontsize: 11pt
    linestretch: 1.15
    colorlinks: true
    listings: true
    include-in-header:
      text: |
        \providecommand{\lstlistingname}{Mã nguồn}
        \providecommand{\lstlistlistingname}{Danh sách mã nguồn}
        \usepackage{titlesec}
        \titlespacing*{\section}{0pt}{1.6ex plus 0.4ex minus 0.2ex}{0.8ex plus 0.2ex}
        \titlespacing*{\subsection}{0pt}{1.3ex plus 0.3ex minus 0.2ex}{0.6ex plus 0.2ex}
        \titlespacing*{\subsubsection}{0pt}{1.0ex plus 0.3ex minus 0.2ex}{0.4ex plus 0.2ex}
        \setlength{\parskip}{0.4em}
        \setlength{\parindent}{0pt}

execute:
  freeze: auto
